{% extends "base.html" %}
{% block content %}
<div class="py-16 bg-white">
    <div class="max-w-3xl mx-auto px-4">
        <span class="text-[10px] font-mono tracking-widest text-amber-600 uppercase font-semibold">Page</span>
        <h1 class="font-serif text-3xl sm:text-4xl md:text-5xl font-bold text-gray-900 tracking-tight leading-tight border-b border-gray-100 pb-4 mt-2">{{ page.title }}</h1>
        <div class="mt-8 text-sm sm:text-base text-gray-600 font-light leading-relaxed prose max-w-none">
            {{ page.content|replace('\n', '<br>')|safe }}
        </div>
    </div>
</div>
{% endblock %}
