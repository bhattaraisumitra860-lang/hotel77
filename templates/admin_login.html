<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Hotel 77</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
        <div class="text-center mb-8">
            <div class="w-12 h-12 rounded-xl bg-gray-950 text-white flex items-center justify-center font-bold text-lg mx-auto mb-4">77</div>
            <h1 class="font-serif text-2xl font-bold text-gray-900">Admin Login</h1>
            <p class="text-sm text-gray-500 mt-2">Hotel 77 Management Panel</p>
        </div>
        {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-100 text-red-700 text-sm rounded-xl">{{ error }}</div>
        {% endif %}
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-mono uppercase text-gray-500 tracking-wider mb-2">Password</label>
                <input type="password" name="password" required class="w-full bg-gray-50 border border-gray-200 focus:border-amber-600 focus:outline-none rounded-xl px-4 py-3 text-sm">
            </div>
            <button type="submit" class="w-full py-3 bg-gray-950 hover:bg-gray-900 text-white rounded-xl text-xs font-mono uppercase tracking-wider font-semibold transition-all cursor-pointer">Login</button>
        </form>
        <a href="/" class="block text-center mt-4 text-xs font-mono text-gray-500 hover:text-gray-900 underline">Back to website</a>
    </div>
</body>
</html>
